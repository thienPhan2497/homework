# .github/workflows/test-oidc.yml
name: Test OIDC k8s

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::742819526038:role/github-actions-bootstrap-role
          aws-region: us-east-1

      # Test 1 — Am I authenticated to AWS?
      - name: Test 1 - AWS Identity
        run: |
          echo "=== Testing AWS Identity ==="
          aws sts get-caller-identity

      # Test 2 — Can I read CloudFormation?
      - name: Test 2 - CloudFormation Access
        run: |
          echo "=== Testing CloudFormation ==="
          aws cloudformation list-stacks \
            --stack-status-filter CREATE_COMPLETE \
            --query "StackSummaries[].StackName"

      # Test 3 — Can I reach the cluster?
      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Test 3 - Run kubectl via SSM
        run: |
          echo "=== Getting Control Plane Instance ID ==="
          INSTANCE_ID=$(aws cloudformation describe-stacks \
            --stack-name k8s-cluster \
            --region us-east-1 \
            --query "Stacks[0].Outputs[?OutputKey=='ControlPlane0InstanceId'].OutputValue" \
            --output text)

          echo "Instance ID: $INSTANCE_ID"

          echo "=== Sending kubectl command via SSM ==="
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --region us-east-1 \
            --parameters 'commands=["kubectl get nodes"]' \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          echo "=== Waiting for command to finish ==="
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --region us-east-1

          echo "=== Output ==="
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --region us-east-1 \
            --query "StandardOutputContent" \
            --output text
